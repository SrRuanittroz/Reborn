<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banca Vila Velha - Reborn</title>
    <style>
        body {
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #1a1a1d;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            transition: background 0.3s ease;
        }

        /* Título agora posicionado em relação ao wrapper da banca */
        .titulo-banca {
            font-size: 32px; font-weight: bold; 
            margin-bottom: 10px; /* Colado na estante */
            text-align: center;
            background: linear-gradient(to right, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-size: 400% 400%; animation: gradientText 8s linear infinite;
            text-transform: uppercase; letter-spacing: 3px;
        }

        @keyframes gradientText { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

        .shelf-wrapper { 
            position: relative; 
            transform: scale(1.15); 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .shelf-container {
            background: #4a2c2a; 
            /* Aumentei o terceiro valor (bottom) para 45px para o nome aparecer livre */
            padding: 25px 25px 45px 25px; 
            border: 10px solid #361d1b; 
            border-radius: 8px 8px 0 0;
            box-shadow: inset 0 0 50px #000; 
            display: flex; 
            gap: 25px; 
            perspective: 1000px; 
            position: relative; 
            z-index: 2;
        }

        .shelf-support { height: 20px; background: #2b1614; width: 104%; margin-left: -2%; border-radius: 0 0 10px 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.7); }

        .glass-pane {
            position: absolute; 
            top: 45px; /* Ajustado para começar abaixo do título */
            left: 0; width: 100%; height: calc(100% - 65px);
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(5px); z-index: 10;
            border-radius: 5px; border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s;
        }

        .glass-pane::before { content: 'ABRA'; color: white; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 10px #000; border: 2px solid white; padding: 10px; }
        .glass-pane.opened { transform: translateY(-110%) rotateX(20deg); opacity: 0; pointer-events: none; }

        .hq-item { text-align: center; }

        .hq-box {
            width: 125px; height: 185px; 
            position: relative; transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .hq-box:hover:not(.aberta) { transform: translateY(-5px) rotateY(10deg); }

        .capa, .interior { position: absolute; width: 100%; height: 100%; border-radius: 2px; backface-visibility: hidden; }

        .capa {
            z-index: 2; transform-origin: left; transition: transform 0.8s ease;
            background-size: cover; background-position: center; border-left: 3px solid #111;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.5);
        }

        .interior {
            background: white; color: #333;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform: translateZ(-1px); font-size: 15px; font-weight: bold; border: 1px solid #999;
            text-align: center; line-height: 1.3; padding: 5px; box-sizing: border-box;
        }

        .hq-box.aberta .capa { transform: rotateY(-155deg); }
        .hq-box.aberta { transform: scale(1.03); }

        .nome-capa { 
            margin-top: 12px; 
            font-weight: bold; font-size: 10px; 
            text-transform: uppercase; color: #f0e68c; 
            text-shadow: 1px 1px 2px #000;
            position: relative;
            z-index: 5;
        }

        .npc-area { position: fixed; bottom: 10px; right: 20px; display: flex; flex-direction: column; align-items: center; }
        .balao { background: white; padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; margin-bottom: 5px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); min-height: 20px; }
        .vendedor-gif { width: 180px; filter: drop-shadow(0 0 10px #000); }
    </style>
</head>
<body>

    <div class="shelf-wrapper">
        <div class="titulo-banca">Banca Vila Velha</div>

        <div class="glass-pane" onclick="this.classList.add('opened')"></div>
        
        <div class="shelf-container">
            <div class="hq-item">
                <div class="hq-box" onclick="reagir(this, 255, 140, 0)">
                    <div class="interior">Yuri<br>Samyre</div>
                    <div class="capa" style="background-image: url('Chris.png');"></div>
                </div>
                <div class="nome-capa">Chris</div>
            </div>

            <div class="hq-item">
                <div class="hq-box" onclick="reagir(this, 218, 165, 32)">
                    <div class="interior">Nelisa<br>Alex</div>
                    <div class="capa" style="background-image: url('Dália.png');"></div>
                </div>
                <div class="nome-capa">Dália</div>
            </div>

            <div class="hq-item">
                <div class="hq-box" onclick="reagir(this, 139, 0, 0)">
                    <div class="interior">Gerbert<br>Karol</div>
                    <div class="capa" style="background-image: url('Kai.png');"></div>
                </div>
                <div class="nome-capa">Kai</div>
            </div>

            <div class="hq-item">
                <div class="hq-box" onclick="reagir(this, 75, 0, 130)">
                    <div class="interior">Joel<br>Igor (invasor)</div>
                    <div class="capa" style="background-image: url('Mikela e Ugiri.png');"></div>
                </div>
                <div class="nome-capa">Mikela e Ugiri</div>
            </div>

            <div class="hq-item">
                <div class="hq-box" onclick="reagir(this, 220, 220, 220)">
                    <div class="interior">Amo vocês<br>❤️</div>
                    <div class="capa" style="background-image: url('Waiver.png');"></div>
                </div>
                <div class="nome-capa">Waiver</div>
            </div>
        </div>
        <div class="shelf-support"></div>
    </div>

    <div class="npc-area">
        <div class="balao" id="fala">Qual vai levar, cria?</div>
        <img src="vendedor.gif" class="vendedor-gif">
    </div>

    <script>
        let coresAbertas = [];

        function reagir(el, r, g, b) {
            const balao = document.getElementById('fala');
            const body = document.body;
            el.classList.toggle('aberta');
            const corId = `${r},${g},${b}`;

            if (el.classList.contains('aberta')) {
                coresAbertas.push({r, g, b, id: corId});
                balao.innerText = "Só tem gostoso aqui";
            } else {
                coresAbertas = coresAbertas.filter(cor => cor.id !== corId);
            }

            if (coresAbertas.length === 0) {
                body.style.background = "#1a1a1d";
                balao.innerText = "Qual vai levar, cria?";
            } else {
                let totalR = 0, totalG = 0, totalB = 0;
                coresAbertas.forEach(cor => {
                    totalR += cor.r; totalG += cor.g; totalB += cor.b;
                });
                const rMedio = Math.round(totalR / coresAbertas.length);
                const gMedio = Math.round(totalG / coresAbertas.length);
                const bMedio = Math.round(totalB / coresAbertas.length);
                body.style.background = `radial-gradient(circle at center, rgb(${rMedio}, ${gMedio}, ${bMedio}) 0%, #1a1a1d 70%)`;
            }
        }
    </script>
</body>
</html>
